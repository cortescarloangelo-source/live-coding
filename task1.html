<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        html, body {
            margin: 0;
            padding: 0;
        }
        .container {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .hero {
            background-color: #fff;
            padding: 20px;
            border: 1px solid #333;
            height: 150px;
            width: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1 {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Hello World</h1>
        </div>
    </div>
</body>
</html>
