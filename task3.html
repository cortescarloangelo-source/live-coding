<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        html, body {
            margin: 0;
            padding: 0;
        }
        .container {
            font-family: Arial, sans-serif;
            height: 100vh;
        }
        .header {
            background-color: #fff;
            padding: 20px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
        }
        .logo {
            width: 50px;
            height: 50px;
            background-color: #333;
            border-radius: 30%;
            margin-right: 20px;
        }
        .company {
            color: #333;
            margin-right: 20px;
            font-weight: 600;
        }
        .nav a {
            color: #333;
            text-decoration: none;
            margin-right: 15px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background-color: #999;
            border-radius: 50%;
            margin-left: 20px;
        }

        .user {
            display: flex;
            align-items: center;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo"></div>
            <div class="company">Hello World Company</div>
            <div class="nav">
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </div>

            <div class="user">
                <div class="username">Hi, John Doe!</div>
                <div class="avatar"></div>
            </div>
        </div>
    </div>
</body>
</html>
